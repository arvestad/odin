<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; padding: 1.5rem; }
  h1 { font-size: 1.25rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.75rem; letter-spacing: 0.05em; }
  #status { font-size: 0.75rem; color: #475569; margin-bottom: 0.75rem; }
  #sort-bar { display: flex; gap: 0.4rem; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; }
  #sort-bar .sort-lbl { font-size: 0.7rem; color: #475569; margin-right: 0.25rem; }
  .sort-btn {
    font-size: 0.7rem; font-weight: 500; padding: 0.2rem 0.55rem;
    border-radius: 0.25rem; cursor: pointer; border: 1px solid #2d3748;
    background: #1e2330; color: #64748b; user-select: none;
    transition: background 0.1s;
  }
  .sort-btn:hover { background: #252d3d; color: #94a3b8; }
  .sort-btn.active { background: #2d3748; color: #e2e8f0; border-color: #4a5568; }
  #sessions { display: flex; flex-direction: column; gap: 0.375rem; }
  .session {
    background: #1e2330; border: 1px solid #2d3748; border-radius: 0.5rem;
    padding: 0.5rem 1.25rem;
  }
  .session.died   { border-left: 3px solid #ef4444; }
  .session.failed { border-left: 3px solid #ef4444; }
  .session.error  { border-left: 3px solid #f97316; }
  .session.warning { border-left: 3px solid #eab308; }
  .session.done   { opacity: 0.5; border-left: 3px solid #4ade80; }
  .session.running { border-left: 3px solid #3b82f6; }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.25rem; }
  .label { font-weight: 600; font-size: 1rem; }
  .meta { font-size: 0.75rem; color: #64748b; }
  .badge {
    font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem;
    border-radius: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .badge.running { background: #1d4ed8; color: #bfdbfe; }
  .badge.done    { background: #166534; color: #bbf7d0; }
  .badge.died    { background: #7f1d1d; color: #fecaca; }
  .badge.failed  { background: #7f1d1d; color: #fecaca; }
  .badge.warning { background: #713f12; color: #fef08a; }
  .badge.error   { background: #7c2d12; color: #fed7aa; }
  .bar-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.1rem; }
  .bar-track { flex: 1; background: #2d3748; border-radius: 999px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; background: #3b82f6; transition: width 0.3s; }
  .bar-fill.done { background: #4ade80; }
  .bar-label { font-size: 0.75rem; color: #94a3b8; white-space: nowrap; }
  .eta { font-size: 0.75rem; color: #64748b; white-space: nowrap; margin-left: auto; }
  .message { font-size: 0.8rem; color: #94a3b8; margin-top: 0.1rem; font-style: italic; }
  .message.prominent { font-style: normal; color: #e2e8f0; font-size: 0.95rem; font-weight: 500; }
  .message.type-warning { color: #eab308; font-style: normal; }
  .message.type-error   { color: #f97316; font-style: normal; }
  .count { font-size: 0.8rem; color: #94a3b8; margin-top: 0.1rem; }
  .msg-ts { font-style: normal; color: #475569; font-size: 0.7rem; }
  .empty { color: #475569; text-align: center; padding: 3rem; }
</style>
</head>
<body>
<h1>ODIN</h1>
<div id="status">Connecting…</div>
<div id="sort-bar"></div>
<div id="sessions"></div>

<script>
const statusEl  = document.getElementById('status');
const sessionsEl = document.getElementById('sessions');
const sortBarEl  = document.getElementById('sort-bar');

// --- Sort state ---
const SORT_LABELS = {t: 'Started', l: 'Label', p: 'Progress', s: 'Status', m: 'Message'};
const SORT_NATURAL_DESC = new Set(['p']);
const STATUS_PRIORITY = {died: 0, failed: 1, error: 2, warning: 3, running: 4, done: 5};

let sortKey  = 't';
let sortDesc = false;
let lastSessions = [];

function setSort(key) {
  if (sortKey === key) {
    sortDesc = !sortDesc;
  } else {
    sortKey  = key;
    sortDesc = SORT_NATURAL_DESC.has(key);
  }
  updateSortBar();
  render(lastSessions);
}

function updateSortBar() {
  const arrow = sortDesc ? '↓' : '↑';
  sortBarEl.innerHTML =
    '<span class="sort-lbl">Sort:</span>' +
    Object.entries(SORT_LABELS).map(([k, label]) => {
      const active = k === sortKey;
      return `<button class="sort-btn${active ? ' active' : ''}" onclick="setSort('${k}')">${label}${active ? ' ' + arrow : ''}</button>`;
    }).join('');
}

function sortSessions(sessions) {
  return [...sessions].sort((a, b) => {
    let va, vb;
    switch (sortKey) {
      case 't': va = a.created_at || 0; vb = b.created_at || 0; break;
      case 'l': va = (a.label||'').toLowerCase(); vb = (b.label||'').toLowerCase(); break;
      case 'p':
        va = a.total ? (a.value||0)/a.total : (a.value||0);
        vb = b.total ? (b.value||0)/b.total : (b.value||0);
        break;
      case 's': va = STATUS_PRIORITY[a.status]??4; vb = STATUS_PRIORITY[b.status]??4; break;
      case 'm': va = (a.last_message||'').toLowerCase(); vb = (b.last_message||'').toLowerCase(); break;
      default:  va = 0; vb = 0;
    }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDesc ? -cmp : cmp;
  });
}

// --- Rendering ---
function fmt(s) {
  const status = s.status || 'running';
  const hasTotal = s.total != null;
  const pct = (hasTotal && s.value != null) ? (s.value / s.total) : null;
  const updated = s.updated ? new Date(s.updated * 1000).toLocaleTimeString() : '';
  const msgTs = s.message_at ? ` <span class="msg-ts">${new Date(s.message_at*1000).toLocaleTimeString()}</span>` : '';

  const barHtml = hasTotal ? `
    <div class="bar-row">
      <div class="bar-track"><div class="bar-fill ${status}" style="width:${pct != null ? Math.round(pct*100) : 0}%"></div></div>
      <span class="bar-label">${pct != null ? Math.round(pct*100)+'%' : ''} ${s.value != null ? s.value+' / '+s.total : ''}</span>
      <span class="eta">${s.eta_seconds != null ? '~'+fmtEta(s.eta_seconds) : ''}</span>
    </div>` : (s.value != null ? `<div class="count">${s.value} items</div>` : '');

  const typeClass = s.last_message_type ? ` type-${s.last_message_type}` : '';
  const msgHtml = s.last_message
    ? `<div class="message${hasTotal ? '' : ' prominent'}${typeClass}">${esc(s.last_message)}${msgTs}</div>`
    : '';

  return `
    <div class="session ${status}">
      <div class="header">
        <span class="label">${esc(s.label)}</span>
        <span class="meta">${esc(s.host)} · pid ${s.pid} · ${updated}</span>
        <span class="badge ${status}">${status}</span>
      </div>
      ${barHtml}
      ${msgHtml}
    </div>`;
}

function fmtEta(s) {
  s = Math.round(s);
  if (s < 60) return `${s}s`;
  if (s < 3600) { const m = Math.floor(s/60), r = s%60; return `${m}m ${String(r).padStart(2,'0')}s`; }
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60); return `${h}h ${String(m).padStart(2,'0')}m`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(sessions) {
  lastSessions = sessions;
  const sorted = sortSessions(sessions);
  if (!sorted.length) {
    sessionsEl.innerHTML = '<div class="empty">No reporters connected.</div>';
    return;
  }
  sessionsEl.innerHTML = sorted.map(fmt).join('');
}

// --- Keyboard sort (same keys as terminal viewer) ---
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key in SORT_LABELS) setSort(e.key);
});

// --- WebSocket ---
function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { statusEl.textContent = 'Connected'; };
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    render(data.sessions || []);
  };
  ws.onclose = () => {
    statusEl.textContent = 'Disconnected — reconnecting…';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

updateSortBar();
connect();
</script>
</body>
</html>
